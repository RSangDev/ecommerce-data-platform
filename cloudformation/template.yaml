AWSTemplateFormatVersion: '2010-09-09'
Description: 'E-Commerce Data Platform - Simplified (No EMR)'

Parameters:
  ProjectName:
    Type: String
    Default: ecommerce-data-platform
    Description: Project name for resource naming

Resources:
  # ========================================
  # S3 DATA LAKE (5GB FREE)
  # ========================================
  
  DataLakeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-datalake-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

  # ========================================
  # DYNAMODB TABLES (25GB FREE)
  # ========================================
  
  WatermarksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-watermarks'
      AttributeDefinitions:
        - AttributeName: pipeline_name
          AttributeType: S
      KeySchema:
        - AttributeName: pipeline_name
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  DataQualityTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-data-quality'
      AttributeDefinitions:
        - AttributeName: check_id
          AttributeType: S
      KeySchema:
        - AttributeName: check_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  PipelineMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-pipeline-metadata'
      AttributeDefinitions:
        - AttributeName: pipeline_id
          AttributeType: S
      KeySchema:
        - AttributeName: pipeline_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # ========================================
  # IAM ROLES
  # ========================================
  
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataLakeBucket.Arn
                  - !Sub '${DataLakeBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt WatermarksTable.Arn
                  - !GetAtt DataQualityTable.Arn
                  - !GetAtt PipelineMetadataTable.Arn

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-glue-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataLakeBucket.Arn
                  - !Sub '${DataLakeBucket.Arn}/*'

  # ========================================
  # LAMBDA FUNCTIONS (1M CALLS FREE)
  # ========================================
  
  DataGeneratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-data-generator'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      Environment:
        Variables:
          DATA_LAKE_BUCKET: !Ref DataLakeBucket
          WATERMARK_TABLE: !Ref WatermarksTable
      Code:
        ZipFile: |
          import json
          import boto3
          from datetime import datetime
          
          s3 = boto3.client('s3')
          dynamodb = boto3.resource('dynamodb')
          
          def lambda_handler(event, context):
              bucket = f"ecommerce-data-platform-datalake-{context.invoked_function_arn.split(':')[4]}"
              
              # Sample data
              products = [
                  {"id": 1, "name": "Product 1", "price": 99.99},
                  {"id": 2, "name": "Product 2", "price": 149.99}
              ]
              
              # Upload to S3
              key = f"bronze/products/date={datetime.now().strftime('%Y-%m-%d')}/data.json"
              s3.put_object(Bucket=bucket, Key=key, Body=json.dumps(products))
              
              return {
                  'statusCode': 200,
                  'body': json.dumps('Data generated successfully')
              }

  DataQualityFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-data-quality'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps('Data quality checks passed')
              }

  # ========================================
  # GLUE CATALOG (1M OBJECTS FREE)
  # ========================================
  
  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub '${ProjectName}_db'
        Description: E-Commerce Data Platform Database

  BronzeCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub '${ProjectName}-bronze-crawler'
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref GlueDatabase
      Targets:
        S3Targets:
          - Path: !Sub 's3://${DataLakeBucket}/bronze/'
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG

  # ========================================
  # SNS ALERTS (1000 EMAILS FREE)
  # ========================================
  
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-alerts'
      DisplayName: Data Platform Alerts

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref AlertTopic
      Endpoint: your-email@example.com

Outputs:
  DataLakeBucket:
    Value: !Ref DataLakeBucket
    Description: Data Lake S3 Bucket

  GlueDatabase:
    Value: !Ref GlueDatabase
    Description: Glue Data Catalog Database

  DataGeneratorFunction:
    Value: !Ref DataGeneratorFunction
    Description: Data Generator Lambda Function

  DataQualityFunction:
    Value: !Ref DataQualityFunction
    Description: Data Quality Lambda Function

  AlertTopic:
    Value: !Ref AlertTopic
    Description: SNS Alert Topic